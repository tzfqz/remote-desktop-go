<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>远程桌面控制 - Web版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: rgba(0, 0, 0, 0.3);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ef4444;
            transition: background 0.3s;
        }

        .status-indicator.online {
            background: #22c55e;
        }

        .container {
            flex: 1;
            display: flex;
            gap: 20px;
            padding: 20px;
        }

        .device-list {
            width: 300px;
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .device-list h2 {
            font-size: 1.25rem;
            margin-bottom: 15px;
            color: #1f2937;
        }

        .device-item {
            padding: 15px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .device-item:hover {
            border-color: #667eea;
            background: #f3f4f6;
        }

        .device-item.selected {
            border-color: #667eea;
            background: #eff6ff;
        }

        .device-name {
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 5px;
        }

        .device-id {
            font-size: 0.875rem;
            color: #6b7280;
        }

        .screen-container {
            flex: 1;
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
        }

        .screen-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .screen-header h2 {
            font-size: 1.25rem;
            color: #1f2937;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5a67d8;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .screen-wrapper {
            flex: 1;
            background: #1f2937;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .screen-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .connection-info {
            background: #fef3c7;
            border: 1px solid #f59e0b;
            border-radius: 6px;
            padding: 10px 15px;
            margin-bottom: 15px;
            display: none;
        }

        .connection-info.show {
            display: block;
        }

        .connection-info p {
            color: #92400e;
            font-size: 0.875rem;
        }

        .no-device {
            color: #6b7280;
            text-align: center;
            padding: 40px 20px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🖥️ 远程桌面控制</h1>
        <div class="status">
            <span id="statusText">未连接</span>
            <div id="statusIndicator" class="status-indicator"></div>
        </div>
    </div>

    <div class="container">
        <div class="device-list">
            <h2>在线设备</h2>
            <div id="deviceList">
                <div class="no-device">暂无在线设备</div>
            </div>
        </div>

        <div class="screen-container">
            <div class="connection-info show" id="connectionInfo">
                <p>💡 提示：请确保服务器正在运行，被控端已连接到服务器</p>
            </div>
            <div class="screen-header">
                <h2 id="currentDeviceName">选择设备开始控制</h2>
                <div class="controls">
                    <button id="connectBtn" class="btn btn-primary" disabled>连接</button>
                    <button id="disconnectBtn" class="btn btn-danger" disabled>断开</button>
                </div>
            </div>
            <div class="screen-wrapper">
                <canvas id="screenCanvas" class="screen-image"></canvas>
            </div>
        </div>
    </div>

    <script>
        class RemoteDesktopClient {
            constructor() {
                this.ws = null;
                this.peerConnection = null;
                this.dataChannel = null;
                this.selectedDevice = null;
                this.devices = [];
                this.iceServers = [];
                this.isConnected = false;
                
                this.initElements();
                this.initEventListeners();
                this.fetchICEServers();
            }

            initElements() {
                this.statusText = document.getElementById('statusText');
                this.statusIndicator = document.getElementById('statusIndicator');
                this.deviceList = document.getElementById('deviceList');
                this.currentDeviceName = document.getElementById('currentDeviceName');
                this.connectBtn = document.getElementById('connectBtn');
                this.disconnectBtn = document.getElementById('disconnectBtn');
                this.connectionInfo = document.getElementById('connectionInfo');
                this.screenCanvas = document.getElementById('screenCanvas');
                this.ctx = this.screenCanvas.getContext('2d');
            }

            initEventListeners() {
                this.connectBtn.addEventListener('click', () => this.connectToDevice());
                this.disconnectBtn.addEventListener('click', () => this.disconnect());
                
                this.screenCanvas.addEventListener('mousemove', (e) => this.handleMouseMove(e));
                this.screenCanvas.addEventListener('mousedown', (e) => this.handleMouseDown(e));
                this.screenCanvas.addEventListener('mouseup', (e) => this.handleMouseUp(e));
                this.screenCanvas.addEventListener('wheel', (e) => this.handleMouseWheel(e));
                this.screenCanvas.addEventListener('keydown', (e) => this.handleKeyDown(e));
                this.screenCanvas.addEventListener('keyup', (e) => this.handleKeyUp(e));
                
                this.screenCanvas.tabIndex = 0;
            }

            async fetchICEServers() {
                try {
                    const response = await fetch('/api/ice-servers');
                    const data = await response.json();
                    this.iceServers = data.stun_servers.map(url => ({ urls: url }));
                    this.connectToServer();
                } catch (error) {
                    console.error('Failed to fetch ICE servers:', error);
                }
            }

            connectToServer() {
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = `${protocol}//${window.location.host}/ws?id=web-controller-${Date.now()}&type=controller`;
                
                this.ws = new WebSocket(wsUrl);
                
                this.ws.onopen = () => {
                    this.updateStatus('已连接', true);
                    this.connectionInfo.classList.remove('show');
                };
                
                this.ws.onmessage = (event) => {
                    this.handleMessage(JSON.parse(event.data));
                };
                
                this.ws.onerror = (error) => {
                    console.error('WebSocket error:', error);
                    this.updateStatus('连接错误', false);
                };
                
                this.ws.onclose = () => {
                    this.updateStatus('已断开', false);
                    setTimeout(() => this.connectToServer(), 3000);
                };
            }

            handleMessage(message) {
                switch (message.type) {
                    case 'device_list':
                        this.updateDeviceList(message.payload);
                        break;
                    case 'offer':
                        this.handleOffer(message.payload);
                        break;
                    case 'answer':
                        this.handleAnswer(message.payload);
                        break;
                    case 'candidate':
                        this.handleCandidate(message.payload);
                        break;
                }
            }

            updateDeviceList(devices) {
                this.devices = devices;
                this.deviceList.innerHTML = '';
                
                if (devices.length === 0) {
                    this.deviceList.innerHTML = '<div class="no-device">暂无在线设备</div>';
                    return;
                }
                
                devices.forEach(device => {
                    const deviceItem = document.createElement('div');
                    deviceItem.className = 'device-item' + (this.selectedDevice?.id === device.id ? ' selected' : '');
                    deviceItem.innerHTML = `
                        <div class="device-name">${device.name}</div>
                        <div class="device-id">${device.id}</div>
                    `;
                    deviceItem.addEventListener('click', () => this.selectDevice(device));
                    this.deviceList.appendChild(deviceItem);
                });
            }

            selectDevice(device) {
                this.selectedDevice = device;
                this.connectBtn.disabled = false;
                this.currentDeviceName.textContent = `设备: ${device.name}`;
                this.updateDeviceList(this.devices);
            }

            async connectToDevice() {
                if (!this.selectedDevice) return;
                
                this.connectBtn.disabled = true;
                
                try {
                    await this.createPeerConnection();
                    const offer = await this.peerConnection.createOffer();
                    await this.peerConnection.setLocalDescription(offer);
                    
                    this.sendSignalingMessage({
                        type: 'offer',
                        to: this.selectedDevice.id,
                        payload: { sdp: this.peerConnection.localDescription.sdp }
                    });
                } catch (error) {
                    console.error('Failed to connect:', error);
                    this.connectBtn.disabled = false;
                }
            }

            async createPeerConnection() {
                this.peerConnection = new RTCPeerConnection({
                    iceServers: this.iceServers
                });
                
                this.peerConnection.onicecandidate = (event) => {
                    if (event.candidate) {
                        this.sendSignalingMessage({
                            type: 'candidate',
                            to: this.selectedDevice.id,
                            payload: {
                                candidate: event.candidate.candidate,
                                sdp_m_line: event.candidate.sdpMLineIndex,
                                sdp_mid: event.candidate.sdpMid
                            }
                        });
                    }
                };
                
                this.peerConnection.oniceconnectionstatechange = () => {
                    const state = this.peerConnection.iceConnectionState;
                    if (state === 'connected' || state === 'completed') {
                        this.isConnected = true;
                        this.disconnectBtn.disabled = false;
                        this.currentDeviceName.textContent = `已连接: ${this.selectedDevice.name}`;
                    } else if (state === 'disconnected' || state === 'failed') {
                        this.isConnected = false;
                        this.disconnect();
                    }
                };
                
                this.dataChannel = this.peerConnection.createDataChannel('remote-desktop');
                this.setupDataChannel();
            }

            setupDataChannel() {
                this.dataChannel.onopen = () => {
                    console.log('Data channel opened');
                };
                
                this.dataChannel.onmessage = (event) => {
                    this.handleDataChannelMessage(event.data);
                };
                
                this.dataChannel.onclose = () => {
                    console.log('Data channel closed');
                };
            }

            async handleOffer(payload) {
                if (!this.peerConnection) {
                    await this.createPeerConnection();
                }
                
                await this.peerConnection.setRemoteDescription({
                    type: 'offer',
                    sdp: payload.sdp
                });
                
                const answer = await this.peerConnection.createAnswer();
                await this.peerConnection.setLocalDescription(answer);
                
                this.sendSignalingMessage({
                    type: 'answer',
                    to: this.selectedDevice.id,
                    payload: { sdp: this.peerConnection.localDescription.sdp }
                });
            }

            async handleAnswer(payload) {
                await this.peerConnection.setRemoteDescription({
                    type: 'answer',
                    sdp: payload.sdp
                });
            }

            async handleCandidate(payload) {
                if (payload.candidate) {
                    await this.peerConnection.addIceCandidate({
                        candidate: payload.candidate,
                        sdpMLineIndex: payload.sdp_m_line,
                        sdpMid: payload.sdp_mid
                    });
                }
            }

            handleDataChannelMessage(data) {
                try {
                    const message = JSON.parse(data);
                    if (message.type === 'screen_frame') {
                        this.renderScreenFrame(message.payload);
                    }
                } catch (error) {
                    console.error('Failed to parse data channel message:', error);
                }
            }

            renderScreenFrame(payload) {
                const img = new Image();
                img.onload = () => {
                    this.screenCanvas.width = payload.width;
                    this.screenCanvas.height = payload.height;
                    this.ctx.drawImage(img, 0, 0);
                };
                img.src = 'data:image/jpeg;base64,' + payload.data;
            }

            sendSignalingMessage(message) {
                if (this.ws && this.ws.readyState === WebSocket.OPEN) {
                    this.ws.send(JSON.stringify(message));
                }
            }

            sendControlMessage(message) {
                if (this.dataChannel && this.dataChannel.readyState === 'open') {
                    this.dataChannel.send(JSON.stringify(message));
                }
            }

            handleMouseMove(e) {
                if (!this.isConnected) return;
                const rect = this.screenCanvas.getBoundingClientRect();
                const x = (e.clientX - rect.left) / rect.width * this.screenCanvas.width;
                const y = (e.clientY - rect.top) / rect.height * this.screenCanvas.height;
                this.sendControlMessage({
                    type: 'mouse_move',
                    payload: { x, y }
                });
            }

            handleMouseDown(e) {
                if (!this.isConnected) return;
                const rect = this.screenCanvas.getBoundingClientRect();
                const x = (e.clientX - rect.left) / rect.width * this.screenCanvas.width;
                const y = (e.clientY - rect.top) / rect.height * this.screenCanvas.height;
                this.sendControlMessage({
                    type: 'mouse_click',
                    payload: { x, y, button: e.button, down: true }
                });
            }

            handleMouseUp(e) {
                if (!this.isConnected) return;
                const rect = this.screenCanvas.getBoundingClientRect();
                const x = (e.clientX - rect.left) / rect.width * this.screenCanvas.width;
                const y = (e.clientY - rect.top) / rect.height * this.screenCanvas.height;
                this.sendControlMessage({
                    type: 'mouse_click',
                    payload: { x, y, button: e.button, down: false }
                });
            }

            handleMouseWheel(e) {
                if (!this.isConnected) return;
                const rect = this.screenCanvas.getBoundingClientRect();
                const x = (e.clientX - rect.left) / rect.width * this.screenCanvas.width;
                const y = (e.clientY - rect.top) / rect.height * this.screenCanvas.height;
                this.sendControlMessage({
                    type: 'mouse_scroll',
                    payload: { x, y, delta_x: e.deltaX, delta_y: e.deltaY }
                });
            }

            handleKeyDown(e) {
                if (!this.isConnected) return;
                e.preventDefault();
                this.sendControlMessage({
                    type: 'key_down',
                    payload: { key_code: e.keyCode, key: e.key }
                });
            }

            handleKeyUp(e) {
                if (!this.isConnected) return;
                e.preventDefault();
                this.sendControlMessage({
                    type: 'key_up',
                    payload: { key_code: e.keyCode, key: e.key }
                });
            }

            disconnect() {
                if (this.dataChannel) {
                    this.dataChannel.close();
                    this.dataChannel = null;
                }
                if (this.peerConnection) {
                    this.peerConnection.close();
                    this.peerConnection = null;
                }
                this.isConnected = false;
                this.disconnectBtn.disabled = true;
                this.connectBtn.disabled = !this.selectedDevice;
                this.currentDeviceName.textContent = '选择设备开始控制';
                this.ctx.clearRect(0, 0, this.screenCanvas.width, this.screenCanvas.height);
            }

            updateStatus(text, online) {
                this.statusText.textContent = text;
                if (online) {
                    this.statusIndicator.classList.add('online');
                } else {
                    this.statusIndicator.classList.remove('online');
                }
            }
        }

        // 初始化客户端
        const client = new RemoteDesktopClient();
    </script>
</body>
</html>
