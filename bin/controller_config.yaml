# 控制端配置文件

# 服务器连接配置
server:
  url: "ws://127.0.0.1:8080/ws"
  reconnect_interval: 5  # 秒

# 网络配置
network:
  p2p: true
  relay: true
  ice_servers:
    - "stun:stun.l.google.com:19302"

# 显示配置
display:
  fps: 30
  quality: 75
  resize: true
  fullscreen: false

# 控制配置
control:
  enable_keyboard: true
  enable_mouse: true
  enable_clipboard: true
  mouse_sensitivity: 1.0

# 安全配置
security:
  auth_token: ""

# 日志配置
logging:
  level: "info"
  file: "controller.log"
